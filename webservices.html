    <meta charset="UTF-8">

    <style>
      /* FOOTER */
footer {
  text-align:center;
  padding:25px 10px;
  border-top:1px solid rgba(255,0,0,0.2);
  color: aliceblue;
}

.footer-links a {
  margin:0 10px;
  color:white;
  font-size:18px;
}
.footer-links a:hover { color:red; }
      body{
        background-color: black;
      }
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 0px 40px;
        
        display: flex;
        justify-content: space-between;
        align-items: center;
        
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,0,0,0.2);
        z-index: 1000;
      }
      
      .logo {
        color: burlywood;
      }
      
      /* UL FIX */
      .nav-links {
        list-style: none;
        display: flex;
        gap: 25px;
        margin: 0;
        padding: 0;
      }
      
      .nav-links li a {
        color: white;
        text-decoration: none;
        font-size: 14px;
        position: relative;
      }
      
      /* ACTIVE + HOVER EFFECT */
      .nav-links li a:hover,
      .nav-links li a.active {
        color: red;
      }
      
      /* underline animation (🔥 premium touch) */
      .nav-links li a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -5px;
        width: 0%;
        height: 2px;
        background: red;
        transition: 0.3s;
      }
      
      .nav-links li a:hover::after {
        width: 100%;
      }
      
      nav a {
        
        color:white;
        margin-left:20px;
        text-decoration:none;
        font-size:14px;
      }
      
      nav a.active { color:red; }
      
      /* SECTIONS */
      section {
        min-height:100vh;
        padding:120px 8%;
      }
      img{

        height: auto;
        width:100%;
      }
@media(max-width:768px){
  nav {
    flex-direction:column;
    gap:10px;
    padding-bottom: 0px;
    position: relative;
  }
  nav li{
    display: none;
  }

  nav div {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
  }
}
.img{
  
  height: auto;
  width: 100%;

}
  </style>
</head>
